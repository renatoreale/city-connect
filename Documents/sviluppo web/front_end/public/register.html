<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione</title>
    <!-- Link a Bootstrap per uno stile rapido e responsivo -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="card p-4" style="width: 100%; max-width: 400px;">
            <h3 class="text-center">Registrazione</h3>
            <!-- Form di Registrazione -->
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Nome Utente</label>
                    <input type="text" class="form-control" id="username" placeholder="Inserisci il nome utente" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Inserisci l'email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Inserisci la password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Registrati</button>
                <button type="button" class="btn btn-secondary btn-block" onclick="redirectToLogin()">Torna al Login</button>
            </form>
            <div id="registerMessage" class="text-center mt-3"></div>
        </div>
    </div>

    <!-- Script per gestire la logica di registrazione -->
    <script>
        // Funzione per gestire la registrazione
        document.getElementById('registerForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('https://nome-app.vercel.app/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('registerMessage').innerText = 'Registrazione avvenuta con successo! Vai al login.';
                    // Reindirizza automaticamente al login dopo qualche secondo
                    setTimeout(() => {
                        window.location.href = '/public/login.html';
                    }, 2000);
                } else {
                    document.getElementById('registerMessage').innerText = data.message || 'Errore durante la registrazione';
                }
            } catch (error) {
                console.error('Errore:', error);
                document.getElementById('registerMessage').innerText = 'Errore di connessione al server';
            }
        });

        // Funzione per reindirizzare alla pagina di login
        function redirectToLogin() {
            window.location.href = '/public/login.html';
        }
    </script>

    <!-- Bootstrap JS e dipendenze -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
